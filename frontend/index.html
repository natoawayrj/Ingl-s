<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronúncia — Leitura Guiada</title>
<style>
  :root { color-scheme: light; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f7f8fa; color: #1a1a2e; min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; padding: 20px; }

  /* HEADER */
  .header {
    display: flex; align-items: center; gap: 12px;
    background: #fff; border: 1px solid #e8eaf0; border-radius: 14px;
    padding: 14px 18px; margin-bottom: 16px;
  }
  .header-icon { font-size: 24px; }
  .header-title { font-size: 17px; font-weight: 700; }
  .header-sub { font-size: 12px; color: #888; }
  .badge {
    margin-left: auto; background: #e8f4fd; color: #2563eb;
    font-size: 11px; font-weight: 700; padding: 4px 11px; border-radius: 20px;
  }
  .link-btn {
    background: none; border: none; color: #2563eb; font-weight: 600;
    cursor: pointer; font-size: 13px; font-family: inherit;
  }
  .link-btn:hover { text-decoration: underline; }

  .card {
    background: #fff; border: 1px solid #e8eaf0; border-radius: 14px;
    padding: 20px; margin-bottom: 16px;
  }
  .label { font-size: 11px; font-weight: 700; color: #aaa;
    letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; }

  input, select {
    width: 100%; border: 1.5px solid #e0e3eb; border-radius: 10px;
    padding: 11px 13px; font-size: 14px; font-family: inherit; outline: none;
    color: #1a1a2e; background: #fff;
  }
  input:focus, select:focus { border-color: #2563eb; }
  .field { margin-bottom: 12px; }

  .btn {
    background: #2563eb; color: #fff; border: none; border-radius: 10px;
    padding: 12px 20px; font-size: 14px; font-weight: 600; cursor: pointer;
    font-family: inherit; transition: background .15s, transform .1s;
  }
  .btn:hover { background: #1d4ed8; }
  .btn:active { transform: scale(.98); }
  .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
  .btn-rec { background: #dc2626; }
  .btn-rec:hover { background: #b91c1c; }
  .btn-ghost { background: #f1f5f9; color: #1a1a2e; }
  .btn-ghost:hover { background: #e2e8f0; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; }

  /* PHRASE */
  .phrase-text { font-size: 24px; line-height: 1.5; font-weight: 600; margin: 6px 0 4px; }
  .phrase-focus { font-size: 12px; color: #2563eb; font-weight: 600; }

  /* DIFF coloring */
  .w-ok { color: #16a34a; }
  .w-wrong { color: #dc2626; text-decoration: underline wavy #dc2626; }
  .w-missing { color: #9ca3af; text-decoration: line-through; }

  .feedback {
    background: #fffbeb; border: 1px solid #fde68a; border-radius: 12px;
    padding: 14px 16px; font-size: 14px; line-height: 1.6; color: #78350f;
    white-space: pre-wrap; margin-top: 14px;
  }
  .explain {
    background: #eef6ff; border: 1px solid #bfdbfe; border-radius: 12px;
    padding: 14px 16px; font-size: 14px; line-height: 1.6; color: #1e3a5f;
    white-space: pre-wrap; margin-top: 12px;
  }
  .explain-title { font-weight: 700; font-size: 13px; margin-bottom: 6px; color: #1d4ed8; }
  .heard { font-size: 13px; color: #555; margin-top: 10px; }
  .meta { font-size: 12px; color: #888; margin-top: 6px; }

  .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; }
  .up { background:#16a34a; } .down { background:#dc2626; }
  .recording { animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:.4;} }

  /* admin de frases */
  .phrase-row { display:flex; gap:10px; align-items:center;
    border-bottom:1px solid #f0f2f5; padding:8px 0; }
  .phrase-row:last-child { border-bottom:none; }
  .phrase-row.inactive { opacity:.45; }
  .phrase-row-main { flex:1; min-width:0; }
  .pr-text { font-size:14px; }
  .pr-meta { font-size:11px; color:#2563eb; }
  .pr-actions { display:flex; gap:10px; flex-shrink:0; }

  /* relatorio de fonema */
  .rep-child { margin-bottom: 18px; }
  .rep-child-name { font-weight: 700; font-size: 15px; margin-bottom: 8px; }
  .rep-focus { padding: 9px 0; border-bottom: 1px solid #f0f2f5; }
  .rep-focus:last-child { border-bottom: none; }
  .rep-focus-head { display: flex; justify-content: space-between; align-items: baseline; font-size: 13px; }
  .rep-focus-name { font-weight: 600; }
  .rep-pct { font-weight: 700; }
  .rep-bar { height: 7px; border-radius: 4px; background: #eef2f7; margin: 5px 0; overflow: hidden; }
  .rep-bar-fill { height: 100%; }
  .rep-weak { font-size: 11px; color: #888; }
  .rep-empty { color: #aaa; font-size: 13px; }

  /* chat / conversa */
  .chat-log {
    display: flex; flex-direction: column; gap: 10px;
    max-height: 380px; overflow-y: auto; padding: 4px 2px 8px;
  }
  .chat-msg { max-width: 82%; padding: 10px 13px; border-radius: 14px;
    font-size: 14px; line-height: 1.45; white-space: pre-wrap; }
  .chat-bot { align-self: flex-start; background: #eef2f7; color: #1a1a2e;
    border-bottom-left-radius: 4px; }
  .chat-me { align-self: flex-end; background: #2563eb; color: #fff;
    border-bottom-right-radius: 4px; }
  .chat-typing { align-self: flex-start; color: #888; font-size: 13px; font-style: italic; }
  .chat-empty { color: #aaa; font-size: 13px; text-align: center; padding: 10px; }
  .chat-input-row { display: flex; gap: 8px; margin-top: 12px; }
  .chat-input-row input { flex: 1; }

  .hist-item { border-bottom: 1px solid #f0f2f5; padding: 10px 0; }
  .hist-item:last-child { border-bottom: none; }
  .hist-target { font-weight: 600; font-size: 14px; }
  .hist-date { font-size: 11px; color: #aaa; }
  .hidden { display: none !important; }
  .err { color: #dc2626; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="wrap">

  <!-- ============ LOGIN ============ -->
  <div id="loginView">
    <div class="header">
      <div class="header-icon">🗣️</div>
      <div>
        <div class="header-title">Pronúncia</div>
        <div class="header-sub">Leitura guiada · prática de pronúncia</div>
      </div>
    </div>
    <div class="card">
      <div class="label">Entrar</div>
      <div class="field"><input id="email" type="email" placeholder="email" autocomplete="username"></div>
      <div class="field"><input id="password" type="password" placeholder="senha" autocomplete="current-password"></div>
      <button class="btn" onclick="doLogin()">Entrar</button>
      <div id="loginErr" class="err"></div>
    </div>
  </div>

  <!-- ============ APP ============ -->
  <div id="appView" class="hidden">
    <div class="header">
      <div class="header-icon">🗣️</div>
      <div>
        <div class="header-title">Olá, <span id="userName"></span></div>
        <div class="header-sub"><span id="sysStatus"></span></div>
      </div>
      <div class="badge" id="levelBadge">B1</div>
      <button class="link-btn" onclick="logout()">sair</button>
    </div>

    <!-- nivel -->
    <div class="card">
      <div class="label">Nível</div>
      <div class="row">
        <select id="levelSelect" style="max-width:140px" onchange="loadPhrase()">
          <option>A2</option><option>B1</option><option>B2</option><option>C1</option>
        </select>
        <button class="btn btn-ghost" onclick="loadPhrase()">Nova frase ↻</button>
        <button class="link-btn" onclick="toggleChat()">💬 conversar</button>
        <button class="link-btn" onclick="toggleHistory()">histórico</button>
        <button class="link-btn hidden" id="adminLink" onclick="toggleAdmin()">frases (admin)</button>
        <button class="link-btn hidden" id="reportLink" onclick="toggleReport()">relatório</button>
      </div>
    </div>

    <!-- frase + gravacao -->
    <div class="card" id="practiceCard">
      <div class="label">Leia em voz alta</div>
      <div class="phrase-text" id="phraseText">…</div>
      <div class="phrase-focus" id="phraseFocus"></div>

      <div class="row" style="margin-top:16px">
        <button class="btn btn-ghost" id="listenBtn" onclick="speakPhrase()">🔊 Ouvir modelo</button>
        <button class="btn btn-rec" id="recBtn" onclick="toggleRecord()">● Gravar</button>
        <button class="btn" id="sendBtn" onclick="sendAudio()" disabled>Enviar p/ avaliar</button>
      </div>
      <div id="practiceErr" class="err"></div>

      <!-- resultado -->
      <div id="result" class="hidden">
        <div class="meta" style="margin-top:16px"><b>Comparação:</b></div>
        <div class="phrase-text" id="diffView" style="font-size:18px"></div>
        <div class="heard" id="heardView"></div>
        <div class="meta" id="metaView"></div>
        <div class="feedback" id="feedbackView"></div>
        <div class="explain hidden" id="explainView">
          <div class="explain-title">👅 Como corrigir os sons</div>
          <div id="explainBody"></div>
        </div>
      </div>
    </div>

    <!-- admin de frases (só responsável) -->
    <div class="card hidden" id="adminCard">
      <div class="label">Frases (admin)</div>
      <div class="row" style="margin-bottom:12px">
        <input id="newPhraseText" placeholder="nova frase em inglês" style="flex:1;min-width:200px">
        <select id="newPhraseLevel" style="max-width:88px">
          <option>A2</option><option selected>B1</option><option>B2</option><option>C1</option>
        </select>
        <input id="newPhraseFocus" placeholder="foco (ex: th sound)" style="max-width:170px">
        <button class="btn" onclick="addPhrase()">+ Add</button>
      </div>
      <div class="row" style="margin-bottom:10px">
        <select id="adminFilterLevel" onchange="loadPhrases()" style="max-width:130px">
          <option value="">todos níveis</option>
          <option>A2</option><option>B1</option><option>B2</option><option>C1</option>
        </select>
      </div>
      <div id="adminErr" class="err"></div>
      <div id="phraseList"></div>
    </div>

    <!-- relatorio de fonema (só responsável) -->
    <div class="card hidden" id="reportCard">
      <div class="label">Relatório de fonema — onde cada um erra mais</div>
      <div id="reportBody"></div>
    </div>

    <!-- conversa livre (chatbot em inglês) -->
    <div class="card hidden" id="chatCard">
      <div class="row" style="align-items:center;margin-bottom:10px">
        <div class="label" style="margin-bottom:0">💬 Conversar em inglês</div>
        <button class="link-btn" style="margin-left:auto" onclick="resetChat()">limpar</button>
      </div>
      <div class="chat-log" id="chatLog"></div>
      <div class="chat-input-row">
        <button class="btn btn-rec" id="chatRecBtn" onclick="toggleChatRecord()" title="falar">🎤</button>
        <input id="chatInput" placeholder="escreva ou fale em inglês…"
               onkeydown="if(event.key==='Enter')sendChat()">
        <button class="btn" id="chatSendBtn" onclick="sendChat()">Enviar</button>
      </div>
      <div id="chatErr" class="err"></div>
    </div>

    <!-- historico -->
    <div class="card hidden" id="historyCard">
      <div class="label">Seu histórico</div>
      <div id="historyList"></div>
    </div>
  </div>
</div>

<script>
// ─── estado ───────────────────────────────
const API = "/api";
let token = localStorage.getItem("token") || null;
let user = JSON.parse(localStorage.getItem("user") || "null");
let currentPhrase = null;
let mediaRecorder = null, chunks = [], audioBlob = null, recording = false;

// ─── helpers de rede ──────────────────────
async function api(path, opts = {}) {
  opts.headers = opts.headers || {};
  if (token) opts.headers["Authorization"] = "Bearer " + token;
  const r = await fetch(API + path, opts);
  if (r.status === 401) { logout(); throw new Error("Sessão expirada"); }
  if (!r.ok) {
    let msg = "Erro " + r.status;
    try { msg = (await r.json()).detail || msg; } catch {}
    throw new Error(msg);
  }
  return r.json();
}

// ─── login ────────────────────────────────
async function doLogin() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  document.getElementById("loginErr").textContent = "";
  try {
    const data = await fetch(API + "/login", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ email, password }),
    }).then(r => { if (!r.ok) throw new Error("Email ou senha inválidos"); return r.json(); });
    token = data.token; user = data.user;
    localStorage.setItem("token", token);
    localStorage.setItem("user", JSON.stringify(user));
    enterApp();
  } catch (e) {
    document.getElementById("loginErr").textContent = e.message;
  }
}

function logout() {
  token = null; user = null;
  localStorage.removeItem("token"); localStorage.removeItem("user");
  document.getElementById("appView").classList.add("hidden");
  document.getElementById("loginView").classList.remove("hidden");
}

// ─── entrar no app ────────────────────────
async function enterApp() {
  document.getElementById("loginView").classList.add("hidden");
  document.getElementById("appView").classList.remove("hidden");
  document.getElementById("userName").textContent = user.name;
  document.getElementById("levelBadge").textContent = user.level;
  document.getElementById("levelSelect").value = user.level;
  // link de admin só para o responsável
  if (user.role === "parent") {
    document.getElementById("adminLink").classList.remove("hidden");
    document.getElementById("reportLink").classList.remove("hidden");
  }
  checkStatus();
  loadPhrase();
}

async function checkStatus() {
  try {
    const h = await fetch(API + "/health").then(r => r.json());
    const ok = h.db;
    document.getElementById("sysStatus").innerHTML =
      `<span class="status-dot ${ok ? "up" : "down"}"></span>` +
      (ok ? "no ar" : "banco offline");
  } catch {
    document.getElementById("sysStatus").innerHTML =
      `<span class="status-dot down"></span>servidor offline`;
  }
}

// ─── frase ────────────────────────────────
async function loadPhrase() {
  resetResult();
  const level = document.getElementById("levelSelect").value;
  document.getElementById("levelBadge").textContent = level;
  try {
    currentPhrase = await api("/phrase/next?level=" + level);
    document.getElementById("phraseText").textContent = currentPhrase.text;
    document.getElementById("phraseFocus").textContent =
      currentPhrase.focus ? "foco: " + currentPhrase.focus : "";
  } catch (e) {
    document.getElementById("phraseText").textContent = "—";
    document.getElementById("phraseFocus").textContent = "";
    document.getElementById("practiceErr").textContent = e.message;
  }
}

// ─── TTS "ouça o modelo" (Web Speech API, grátis) ───
let enVoice = null;
function pickEnVoice() {
  const voices = speechSynthesis.getVoices();
  // prioriza en-US, depois qualquer en-
  enVoice = voices.find(v => v.lang === "en-US")
         || voices.find(v => v.lang && v.lang.startsWith("en"))
         || null;
}
if ("speechSynthesis" in window) {
  pickEnVoice();
  speechSynthesis.onvoiceschanged = pickEnVoice;
}

function speakPhrase() {
  if (!currentPhrase || !("speechSynthesis" in window)) return;
  speechSynthesis.cancel();              // corta fala anterior
  const u = new SpeechSynthesisUtterance(currentPhrase.text);
  u.lang = "en-US";
  if (enVoice) u.voice = enVoice;
  u.rate = 0.9;                          // um tico mais devagar p/ aprender
  const b = document.getElementById("listenBtn");
  b.disabled = true; b.textContent = "🔊 Tocando…";
  u.onend = u.onerror = () => { b.disabled = false; b.textContent = "🔊 Ouvir modelo"; };
  speechSynthesis.speak(u);
}

// ─── gravação (MediaRecorder) ─────────────
async function toggleRecord() {
  if (recording) { stopRecord(); return; }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mediaRecorder = new MediaRecorder(stream);
    chunks = [];
    mediaRecorder.ondataavailable = e => chunks.push(e.data);
    mediaRecorder.onstop = () => {
      audioBlob = new Blob(chunks, { type: "audio/webm" });
      stream.getTracks().forEach(t => t.stop());
      document.getElementById("sendBtn").disabled = false;
    };
    mediaRecorder.start();
    recording = true;
    const b = document.getElementById("recBtn");
    b.textContent = "■ Parar"; b.classList.add("recording");
    document.getElementById("practiceErr").textContent = "";
  } catch (e) {
    document.getElementById("practiceErr").textContent = "Sem acesso ao microfone: " + e.message;
  }
}

function stopRecord() {
  if (mediaRecorder && recording) mediaRecorder.stop();
  recording = false;
  const b = document.getElementById("recBtn");
  b.textContent = "● Gravar"; b.classList.remove("recording");
}

// ─── enviar p/ avaliar ────────────────────
async function sendAudio() {
  if (!audioBlob || !currentPhrase) return;
  const send = document.getElementById("sendBtn");
  send.disabled = true; send.textContent = "Avaliando…";
  document.getElementById("practiceErr").textContent = "";
  try {
    const fd = new FormData();
    fd.append("phrase_id", currentPhrase.id);
    fd.append("audio", audioBlob, "audio.webm");
    const res = await api("/practice", { method: "POST", body: fd });
    showResult(res);
  } catch (e) {
    document.getElementById("practiceErr").textContent = e.message;
  } finally {
    send.disabled = false; send.textContent = "Enviar p/ avaliar";
  }
}

function showResult(res) {
  // diff colorido
  const html = res.diff.words.map(w => {
    const cls = w.status === "ok" ? "w-ok" : w.status === "wrong" ? "w-wrong" : "w-missing";
    return `<span class="${cls}">${escapeHtml(w.word)}</span>`;
  }).join(" ");
  document.getElementById("diffView").innerHTML = html;
  document.getElementById("heardView").innerHTML =
    "<b>Whisper ouviu:</b> " + escapeHtml(res.transcription || "(nada)");
  document.getElementById("metaView").textContent =
    res.diff.summary + (res.wpm ? ` · ${res.wpm} wpm` : "");
  document.getElementById("feedbackView").textContent = res.feedback;

  // explicação fonética detalhada (só vem quando a nota foi baixa)
  const exBox = document.getElementById("explainView");
  if (res.explanation) {
    document.getElementById("explainBody").textContent = res.explanation;
    exBox.classList.remove("hidden");
  } else {
    exBox.classList.add("hidden");
  }

  document.getElementById("result").classList.remove("hidden");
}

function resetResult() {
  audioBlob = null;
  document.getElementById("sendBtn").disabled = true;
  document.getElementById("result").classList.add("hidden");
  document.getElementById("practiceErr").textContent = "";
}

// ─── histórico ────────────────────────────
async function toggleHistory() {
  const card = document.getElementById("historyCard");
  if (!card.classList.contains("hidden")) { card.classList.add("hidden"); return; }
  try {
    const rows = await api("/history?limit=30");
    document.getElementById("historyList").innerHTML = rows.length
      ? rows.map(r => `
        <div class="hist-item">
          <div class="hist-target">${escapeHtml(r.target_text)}</div>
          <div class="hist-date">${new Date(r.created_at).toLocaleString()}
            ${r.wpm ? "· " + r.wpm + " wpm" : ""}</div>
        </div>`).join("")
      : "<div style='color:#aaa;font-size:13px'>Sem tentativas ainda.</div>";
    card.classList.remove("hidden");
  } catch (e) {
    alert(e.message);
  }
}

function escapeHtml(t) {
  return (t || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// ─── admin de frases (só responsável) ─────
async function toggleAdmin() {
  const card = document.getElementById("adminCard");
  if (!card.classList.contains("hidden")) { card.classList.add("hidden"); return; }
  await loadPhrases();
  card.classList.remove("hidden");
}

async function loadPhrases() {
  const lvl = document.getElementById("adminFilterLevel").value;
  document.getElementById("adminErr").textContent = "";
  try {
    const rows = await api("/phrases" + (lvl ? "?level=" + lvl : ""));
    renderPhrases(rows);
  } catch (e) { document.getElementById("adminErr").textContent = e.message; }
}

function renderPhrases(rows) {
  const el = document.getElementById("phraseList");
  if (!rows.length) {
    el.innerHTML = "<div style='color:#aaa;font-size:13px'>Nenhuma frase.</div>";
    return;
  }
  el.innerHTML = rows.map(r => `
    <div class="phrase-row${r.active ? "" : " inactive"}" data-id="${r.id}">
      <div class="phrase-row-main">
        <div class="pr-text">${escapeHtml(r.text)}</div>
        <div class="pr-meta">${r.level}${r.focus ? " · " + escapeHtml(r.focus) : ""}${r.active ? "" : " · inativa"}</div>
      </div>
      <div class="pr-actions">
        <button class="link-btn" onclick="editPhrase(${r.id})">editar</button>
        <button class="link-btn" onclick="setPhraseActive(${r.id}, ${r.active ? 0 : 1})">${r.active ? "desativar" : "ativar"}</button>
      </div>
    </div>`).join("");
}

async function addPhrase() {
  const text = document.getElementById("newPhraseText").value.trim();
  const level = document.getElementById("newPhraseLevel").value;
  const focus = document.getElementById("newPhraseFocus").value.trim();
  document.getElementById("adminErr").textContent = "";
  if (!text) { document.getElementById("adminErr").textContent = "Digite a frase."; return; }
  try {
    await api("/phrases", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, level, focus }),
    });
    document.getElementById("newPhraseText").value = "";
    document.getElementById("newPhraseFocus").value = "";
    await loadPhrases();
  } catch (e) { document.getElementById("adminErr").textContent = e.message; }
}

async function editPhrase(id) {
  const cur = document.querySelector(`.phrase-row[data-id="${id}"] .pr-text`);
  const text = prompt("Editar frase:", cur ? cur.textContent : "");
  if (text === null) return;                       // cancelou
  try {
    await api("/phrases/" + id, {
      method: "PATCH", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text }),
    });
    await loadPhrases();
  } catch (e) { document.getElementById("adminErr").textContent = e.message; }
}

async function setPhraseActive(id, active) {
  try {
    await api("/phrases/" + id, {
      method: "PATCH", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ active: !!active }),
    });
    await loadPhrases();
  } catch (e) { document.getElementById("adminErr").textContent = e.message; }
}

// ─── relatório de fonema (só responsável) ─
async function toggleReport() {
  const card = document.getElementById("reportCard");
  if (!card.classList.contains("hidden")) { card.classList.add("hidden"); return; }
  document.getElementById("reportBody").innerHTML =
    "<div class='rep-empty'>Carregando…</div>";
  card.classList.remove("hidden");
  try {
    const data = await api("/report/phonemes");
    renderReport(data);
  } catch (e) {
    document.getElementById("reportBody").innerHTML =
      `<div class="err">${escapeHtml(e.message)}</div>`;
  }
}

// cor por dificuldade: vermelho < 60% < amarelo < 80% < verde
function accColor(a) {
  if (a < 0.6) return "#dc2626";
  if (a < 0.8) return "#d97706";
  return "#16a34a";
}

function renderReport(data) {
  const kids = data.children || [];
  if (!kids.length) {
    document.getElementById("reportBody").innerHTML =
      "<div class='rep-empty'>Nenhum filho cadastrado.</div>";
    return;
  }
  document.getElementById("reportBody").innerHTML = kids.map(k => {
    if (!k.by_focus.length)
      return `<div class="rep-child">
          <div class="rep-child-name">${escapeHtml(k.name)}</div>
          <div class="rep-empty">Sem prática ainda.</div>
        </div>`;
    const rows = k.by_focus.map(f => {
      const pct = Math.round(f.avg_accuracy * 100);
      const col = accColor(f.avg_accuracy);
      const weak = f.weak_words.length
        ? "erra mais: " + f.weak_words.map(w => escapeHtml(w.word)).join(", ")
        : "";
      return `<div class="rep-focus">
          <div class="rep-focus-head">
            <span class="rep-focus-name">${escapeHtml(f.focus)}</span>
            <span class="rep-pct" style="color:${col}">${pct}%</span>
          </div>
          <div class="rep-bar"><div class="rep-bar-fill" style="width:${pct}%;background:${col}"></div></div>
          <div class="rep-weak">${f.attempts} tentativa(s)${weak ? " · " + weak : ""}</div>
        </div>`;
    }).join("");
    return `<div class="rep-child">
        <div class="rep-child-name">${escapeHtml(k.name)}</div>
        ${rows}
      </div>`;
  }).join("");
}

// ─── conversa livre (chatbot) ─────────────
let chatHistory = [];        // [{role, content}] — efêmero, só na memória
let chatBusy = false;
let chatRec = null, chatChunks = [], chatRecording = false;

function toggleChat() {
  const card = document.getElementById("chatCard");
  if (!card.classList.contains("hidden")) { card.classList.add("hidden"); return; }
  card.classList.remove("hidden");
  if (!chatHistory.length) {
    // saudação inicial do bot, sem chamar o LLM
    chatHistory.push({ role: "assistant",
      content: "Hi! I'm your English buddy. What did you do today? 🙂" });
  }
  renderChat();
  document.getElementById("chatInput").focus();
}

function renderChat(typing) {
  const log = document.getElementById("chatLog");
  if (!chatHistory.length && !typing) {
    log.innerHTML = "<div class='chat-empty'>Diga oi para começar.</div>";
    return;
  }
  let html = chatHistory.map(m =>
    `<div class="chat-msg ${m.role === "user" ? "chat-me" : "chat-bot"}">${escapeHtml(m.content)}</div>`
  ).join("");
  if (typing) html += `<div class="chat-typing">digitando…</div>`;
  log.innerHTML = html;
  log.scrollTop = log.scrollHeight;
}

async function sendChat() {
  if (chatBusy) return;
  const inp = document.getElementById("chatInput");
  const text = inp.value.trim();
  if (!text) return;
  inp.value = "";
  document.getElementById("chatErr").textContent = "";
  chatHistory.push({ role: "user", content: text });
  chatBusy = true;
  document.getElementById("chatSendBtn").disabled = true;
  renderChat(true);
  try {
    const res = await api("/chat", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ messages: chatHistory }),
    });
    chatHistory.push({ role: "assistant", content: res.reply || "…" });
    renderChat();
  } catch (e) {
    document.getElementById("chatErr").textContent = e.message;
    renderChat();
  } finally {
    chatBusy = false;
    document.getElementById("chatSendBtn").disabled = false;
    inp.focus();
  }
}

function resetChat() {
  chatHistory = [];
  document.getElementById("chatErr").textContent = "";
  toggleChat(); toggleChat();   // fecha e reabre p/ recriar a saudação
}

// voz no chat: grava → /transcribe → joga o texto no input (não envia sozinho)
async function toggleChatRecord() {
  if (chatRecording) {
    if (chatRec) chatRec.stop();
    chatRecording = false;
    const b = document.getElementById("chatRecBtn");
    b.textContent = "🎤"; b.classList.remove("recording");
    return;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    chatRec = new MediaRecorder(stream);
    chatChunks = [];
    chatRec.ondataavailable = e => chatChunks.push(e.data);
    chatRec.onstop = async () => {
      stream.getTracks().forEach(t => t.stop());
      const blob = new Blob(chatChunks, { type: "audio/webm" });
      const b = document.getElementById("chatRecBtn");
      b.textContent = "…";
      try {
        const fd = new FormData();
        fd.append("audio", blob, "audio.webm");
        const res = await api("/transcribe", { method: "POST", body: fd });
        const inp = document.getElementById("chatInput");
        inp.value = (inp.value ? inp.value + " " : "") + (res.text || "");
        inp.focus();
      } catch (e) {
        document.getElementById("chatErr").textContent = e.message;
      } finally {
        b.textContent = "🎤";
      }
    };
    chatRec.start();
    chatRecording = true;
    const b = document.getElementById("chatRecBtn");
    b.textContent = "■"; b.classList.add("recording");
    document.getElementById("chatErr").textContent = "";
  } catch (e) {
    document.getElementById("chatErr").textContent = "Sem acesso ao microfone: " + e.message;
  }
}
